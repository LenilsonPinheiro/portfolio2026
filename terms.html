    <script>
        window.addEventListener('load', function () {
            var loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
                setTimeout(function () {
                    loadingScreen.classList.add('hidden');
                    loadingScreen.setAttribute('aria-hidden', 'true');
                }, 320);
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () {});
            }
        });

        var cursor = document.getElementById('customCursor');
        if (cursor) {
            var mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
            document.addEventListener('mousemove', function (e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursor.classList.add('active');
            });
            document.addEventListener('mouseleave', function () {
                cursor.classList.remove('active');
            });
            function animateCursor() {
                cursorX += (mouseX - cursorX) * 0.12;
                cursorY += (mouseY - cursorY) * 0.12;
                cursor.style.left = cursorX + 'px';
                cursor.style.top = cursorY + 'px';
                requestAnimationFrame(animateCursor);
            }
            if (window.matchMedia('(pointer: fine)').matches) {
                animateCursor();
                document.querySelectorAll('a, button, select, input, textarea').forEach(function (el) {
                    el.addEventListener('mouseenter', function () { cursor.classList.add('hover'); });
                    el.addEventListener('mouseleave', function () { cursor.classList.remove('hover'); });
                });
            } else {
                cursor.style.display = 'none';
            }
        }

        var navbar = document.getElementById('navbar');
        if (navbar) {
            window.addEventListener('scroll', function () {
                if (window.scrollY > 50) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');
            });
        }

        var mobileMenuToggle = document.getElementById('mobileMenuToggle');
        var navLinks = document.getElementById('navLinks');
        if (mobileMenuToggle && navLinks) {
            function setMenuOpen(open) {
                navLinks.classList.toggle('active', open);
                mobileMenuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                var pack = window.PortfolioI18n && window.PortfolioI18n.T && window.__i18nActive ? window.PortfolioI18n.T[window.__i18nActive] : null;
                var labelOpen = pack ? pack.ariaMenu : 'Menu';
                var labelClose = pack ? pack.ariaMenuClose : 'Close';
                mobileMenuToggle.setAttribute('aria-label', open ? labelClose : labelOpen);
                var icon = mobileMenuToggle.querySelector('i');
                if (icon) icon.className = open ? 'fas fa-times' : 'fas fa-bars';
            }
            mobileMenuToggle.addEventListener('click', function () {
                setMenuOpen(!navLinks.classList.contains('active'));
            });
            document.querySelectorAll('.nav-links a').forEach(function (link) {
                link.addEventListener('click', function () { setMenuOpen(false); });
            });
        }

        function checkTermsReveal() {
            document.querySelectorAll('.privacy-card.reveal').forEach(function (el) {
                if (el.getBoundingClientRect().top < window.innerHeight - 80) el.classList.add('active');
            });
        }
        window.addEventListener('scroll', checkTermsReveal);
        window.addEventListener('load', checkTermsReveal);
    </script>
