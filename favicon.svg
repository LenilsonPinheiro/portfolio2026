<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Lenilson Pinheiro Valério — monograma LP">
  <defs>
    <linearGradient id="lpFill" x1="14%" y1="10%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="52%" stop-color="#00b4ff"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="lpFillLight" x1="14%" y1="10%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="letterDepth" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="0.6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style type="text/css">
      .tile-dark{fill:#0a0a0f}
      .tile-light{fill:#f0f4fa;display:none}
      .rim-dark{fill:none;stroke:url(#rim);stroke-width:2.15;stroke-linejoin:round}
      .rim-light{fill:none;stroke:url(#rimLight);stroke-width:2.15;stroke-linejoin:round;display:none}
      .mono-dark{fill:url(#lpFill);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:34px;font-weight:800;letter-spacing:-0.1em}
      .mono-light{fill:url(#lpFillLight);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:34px;font-weight:800;letter-spacing:-0.1em;display:none}
      @media (prefers-color-scheme:light){
        .tile-dark{display:none}
        .tile-light{display:block}
        .rim-dark{display:none}
        .rim-light{display:block}
        .mono-dark{display:none}
        .mono-light{display:block}
      }
    </style>
  </defs>
  <rect class="tile-dark" width="100" height="100" rx="22" ry="22"/>
  <rect class="tile-light" width="100" height="100" rx="22" ry="22"/>
  <rect class="rim-dark" x="2.5" y="2.5" width="95" height="95" rx="19.5" ry="19.5"/>
  <rect class="rim-light" x="2.5" y="2.5" width="95" height="95" rx="19.5" ry="19.5"/>
  <text class="mono-dark" x="50" y="63" text-anchor="middle" dominant-baseline="middle" filter="url(#letterDepth)" text-rendering="geometricPrecision">LP</text>
  <text class="mono-light" x="50" y="63" text-anchor="middle" dominant-baseline="middle" filter="url(#letterDepth)" text-rendering="geometricPrecision">LP</text>
</svg>
