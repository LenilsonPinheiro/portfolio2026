name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Apps Script Web App URL
        env:
          FROM_SECRET: ${{ secrets.PORTFOLIO_APPS_SCRIPT_WEBAPP_URL }}
          FROM_VAR: ${{ vars.PORTFOLIO_APPS_SCRIPT_WEBAPP_URL }}
        run: |
          export GAS_URL="${FROM_SECRET:-$FROM_VAR}"
          if [ -n "$GAS_URL" ]; then
            python3 scripts/inject_gas_url.py
          else
            echo "Sem secret/variable PORTFOLIO_APPS_SCRIPT_WEBAPP_URL — mantém-se js/contact-endpoint.js do repositório."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
